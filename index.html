<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cornballs.lol - TEST PAGE</title>
    <style>
        /* Reset and full-screen setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Impact', 'Arial Black', sans-serif;
            /* Fast flashing background animation */
            animation: flashBackground 0.1s infinite;
        }

        h1 {
            font-size: 8vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 20px;
            /* Text color cycling animation */
            animation: flashText 0.15s infinite;
            text-shadow: 5px 5px 0px #000;
        }

        /* Background color keyframes */
        @keyframes flashBackground {
            0% { background-color: #ff0000; }
            25% { background-color: #00ff00; }
            50% { background-color: #0000ff; }
            75% { background-color: #ffff00; }
            100% { background-color: #ff00ff; }
        }

        /* Text color keyframes */
        @keyframes flashText {
            0% { color: #ffffff; transform: scale(1); }
            50% { color: #00ffff; transform: scale(1.05); }
            100% { color: #ff007f; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>cornballs.lol</h1>

</body>
</html>
